services:
  nix-config:
    image: ghcr.io/cachix/devenv/devcontainer
    environment:
      - CLAUDE_CONFIG_DIR=/home/vscode/.claude
    volumes:
      - ..:/workspaces:cached
      - nix-store:/nix
      - claude-data:/home/vscode/.claude
      - ./.envrc:/workspaces/.envrc
    cap_add:
    #  - SYS_PTRACE
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - seccomp:unconfined
    # Overrides default command so things don't shut down after the process ends.
    #entrypoint: ["/nix-entrypoint.sh"]
    #command: sleep infinity

volumes:
  nix-store:
  claude-data:
